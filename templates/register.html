{% extends "base.html" %}

{% block title %}Register - TaskFlow{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">Create Account</h1>
    
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/register" method="post">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input class="form-input" type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" type="email" id="email" name="email" required placeholder="alex@example.com">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required placeholder="Create a strong password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">Join TaskFlow</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600;">Log in</a>
    </p>
</div>
{% endblock %}
