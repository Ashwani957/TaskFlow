{% extends "base.html" %}

{% block title %}Login - TaskFlow{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">Welcome Back</h1>
    
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">Login to Dashboard</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="/register" style="color: var(--primary); font-weight: 600;">Sign up</a>
    </p>
</div>
{% endblock %}
