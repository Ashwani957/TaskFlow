<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo">TaskFlow</a>
            <div class="nav-links">
                {% if user %}
                    <a href="/tasks" class="nav-link">My Tasks</a>
                    <a href="/tasks/create" class="btn btn-primary">New Task</a>
                    <a href="/logout" class="nav-link">Logout</a>
                {% else %}
                    <a href="/login" class="nav-link">Login</a>
                    <a href="/register" class="btn btn-primary">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem;">
        &copy; 2024 TaskFlow. Built with FastAPI & Jinja2.
    </footer>
</body>
</html>
